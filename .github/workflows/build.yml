name: Build TIC-80 PRO

on: [push, pull_request]

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  TIC80_RELEASE: "1.1.2837"   # <-- можно обновлять при выходе новых версий

jobs:

  # ============================
  # === Windows Build (x64) ===
  # ============================
  windows:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 2.6

      # --- Скачиваем официальный TIC-80 ---
      - name: Download official TIC-80 release
        shell: powershell
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/nesbox/TIC-80/releases/download/v$env:TIC80_RELEASE/tic80-v$env:TIC80_RELEASE-windows.zip" `
            -OutFile "tic80.zip"
          Expand-Archive tic80.zip -DestinationPath official

      # --- Копируем players/ из официального релиза ---
      - name: Copy players from official release
        shell: cmd
        run: |
          xcopy official\players players /E /I /Y

      # --- Сборка PRO ---
      - name: Build
        shell: cmd
        run: |
          cd build
          cmake -G "Visual Studio 17 2022" ^
            -DBUILD_SDLGPU=On ^
            -DCMAKE_BUILD_TYPE=MinSizeRel ^
            -DBUILD_WITH_ALL=ON ^
            -DBUILD_PRO=On ^
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 ^
            ..
          cmake --build . --config MinSizeRel --parallel

      # --- Копируем ресурсы ---
      - name: Copy resources
        shell: cmd
        run: |
          xcopy system build\bin\system /E /I /Y
          xcopy templates build\bin\templates /E /I /Y
          xcopy art build\bin\art /E /I /Y
          xcopy players build\bin\players /E /I /Y

      # --- Артефакт ---
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tic80-windows
          path: |
            build/bin/tic80.exe
            build/bin/*.dll
            build/bin/system
            build/bin/templates
            build/bin/art
            build/bin/players


  # ============================
  # === macOS Build (x64) =====
  # ============================
  macos:
    runs-on: macos-15-intel

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Fix brew conflict
        run: brew uninstall --ignore-dependencies libidn2

      # --- Скачиваем официальный TIC-80 ---
      - name: Download official TIC-80 release
        run: |
          curl -L "https://github.com/nesbox/TIC-80/releases/download/v$TIC80_RELEASE/tic80-v$TIC80_RELEASE-osx.zip" -o tic80.zip
          unzip tic80.zip -d official

      # --- Копируем players/ ---
      - name: Copy players from official release
        run: |
          cp -R official/players players

      # --- Сборка PRO ---
      - name: Build
        run: |
          cd build
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_STATIC=ON \
            -DBUILD_SDLGPU=On \
            -DBUILD_WITH_ALL=ON \
            -DBUILD_PRO=On \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            ..
          cmake --build . --parallel

      # --- Копируем ресурсы ---
      - name: Copy resources
        run: |
          cp -R system build/bin/system
          cp -R templates build/bin/templates
          cp -R art build/bin/art
          cp -R players build/bin/players

      # --- Артефакт ---
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tic80-macos
          path: |
            build/bin/tic80
            build/bin/*.dylib
            build/bin/system
            build/bin/templates
            build/bin/art
            build/bin/players
